name: Docker Build Projects

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build node-prometheus-grafana
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image owner
        id: owner
        shell: bash
        run: echo "value=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/node-prometheus-grafana:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/node-prometheus-grafana:${{ github.sha }}
          cache-from: type=gha,scope=node-prometheus-grafana
          cache-to: type=gha,scope=node-prometheus-grafana,mode=max
